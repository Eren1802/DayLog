<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DayLog - Edit</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Sora:wght@400;500;600&family=Nunito:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        .theme-toggle { position: fixed; top: 1rem; right: 1rem; background: none; border: 0.5px solid #ddd; border-radius: 8px; padding: 6px 12px; cursor: pointer; font-size: 16px; transition: all 0.2s; }
.theme-toggle:hover { background: #f0f0f0; }
body.dark { background: #111110; color: #e8e8e4; }
body.dark .card { background: #1c1c1a; border-color: #2a2a28; }
body.dark .form-control { background: #252523; border-color: #2a2a28; color: #e8e8e4; }
body.dark .theme-toggle { border-color: #2a2a28; color: #888; }
body.dark .theme-toggle:hover { background: #252523; }
body.dark .logo { color: #e8e8e4; }
body.dark .subtitle { color: #666; }
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Nunito', sans-serif; background: #f5f5f0; color: #1a1a1a; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 1rem; }
        .card { background: #fff; border-radius: 20px; border: 0.5px solid #e8e8e8; padding: 2.5rem 2rem; width: 100%; max-width: 500px; }
        .logo { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; font-family: 'Sora', sans-serif; margin-bottom: 0.25rem; }
        .logo span { color: #1D9E75; }
        .subtitle { font-size: 13px; color: #aaa; margin-bottom: 2rem; }
        .form-group { margin-bottom: 14px; }
        .form-label { font-size: 12px; color: #aaa; margin-bottom: 5px; display: block; }
        .form-control { width: 100%; background: #f8f8f6; border: 0.5px solid #e8e8e8; border-radius: 8px; padding: 10px 12px; font-size: 13px; font-family: 'Nunito', sans-serif; color: #1a1a1a; outline: none; transition: border 0.2s; resize: none; }
        .form-control:focus { border-color: #1D9E75; }
        .submit-btn { width: 100%; background: #1D9E75; color: #fff; border: none; border-radius: 8px; padding: 11px; font-size: 13px; font-family: 'Nunito', sans-serif; font-weight: 500; cursor: pointer; margin-top: 6px; transition: background 0.2s; }
        .submit-btn:hover { background: #0F6E56; }
        .back-link { text-align: center; margin-top: 1.25rem; font-size: 13px; color: #aaa; }
        .back-link a { color: #1D9E75; text-decoration: none; }
    </style>
</head>
<body>
    <button class="theme-toggle" id="themeToggle" onclick="toggleTheme()">🌙</button>
    <div class="card">
        <div class="logo">Day<span>Log</span></div>
        <div class="subtitle">Edit your log for {{ log.date }}</div>
        <form method="POST">
            {% csrf_token %}
            <div class="form-group">
                <label class="form-label">What did you do?</label>
                <textarea name="done" class="form-control" rows="3" required>{{ log.done }}</textarea>
            </div>
            <div class="form-group">
                <label class="form-label">What's still pending?</label>
                <textarea name="pending" class="form-control" rows="2">{{ log.pending }}</textarea>
            </div>
            <div class="form-group">
                <label class="form-label">How are you feeling?</label>
                <input type="text" name="mood" class="form-control" value="{{ log.mood }}" maxlength="50">
            </div>
            <button type="submit" class="submit-btn">Save changes</button>
        </form>
        <div class="back-link"><a href="/dashboard/">← Back to dashboard</a></div>
    </div>
    <script>
    function toggleTheme() {
        const body = document.body;
        const btn = document.getElementById('themeToggle');
        body.classList.toggle('dark');
        const isDark = body.classList.contains('dark');
        btn.textContent = isDark ? '☀️' : '🌙';
        localStorage.setItem('theme', isDark ? 'dark' : 'light');
    }
    window.onload = function() {
        const saved = localStorage.getItem('theme');
        if (saved === 'dark') {
            document.body.classList.add('dark');
            document.getElementById('themeToggle').textContent = '☀️';
        }
    }
</script>
</body>
</html>
